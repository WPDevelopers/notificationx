name: Plugin Check (PCP)

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: 'The name of the build artifact'

jobs:
  pcp-test:
    name: PCP Check (PHP 8.4)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: notificationx

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mysqli, mbstring, xml, curl, zip, intl, gd
          coverage: none
          tools: composer, wp-cli

      - name: Wait for MySQL to be ready
        run: |
          echo "⏳ Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if mysqladmin ping -h"127.0.0.1" -P"3306" -u"root" -p"root" --silent; then
              echo "✅ MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Download WordPress
        run: |
          wp core download --path=/tmp/test-site

      - name: Create WordPress configuration
        run: |
          wp config create \
            --path=/tmp/test-site \
            --dbname=wordpress_test \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1:3306 \
            --skip-check

      - name: Install WordPress
        run: |
          wp core install \
            --path=/tmp/test-site \
            --url=http://localhost \
            --title="NotificationX PCP Test" \
            --admin_user=admin \
            --admin_password=admin \
            --admin_email=test@example.com \
            --skip-email

          wp config set WP_DEBUG true --raw --path=/tmp/test-site
          wp config set WP_DEBUG_LOG true --raw --path=/tmp/test-site

      - name: Copy plugin to WordPress
        run: |
          mkdir -p /tmp/test-site/wp-content/plugins/notificationx
          cp -r notificationx/* /tmp/test-site/wp-content/plugins/notificationx/

      - name: Activate NotificationX plugin
        run: |
          wp plugin activate notificationx --path=/tmp/test-site

      - name: Install Plugin Check Plugin
        run: |
          wp plugin install plugin-check --activate --path=/tmp/test-site

      - name: Run Plugin Check
        run: |
          # Redirect full output to a file
          wp plugin check notificationx --path=/tmp/test-site --ignore-warnings 2>&1 | tee /tmp/pcp-output.txt || true

          if grep -qF "Success: Checks complete. No errors found." /tmp/pcp-output.txt; then
            echo "✅ Plugin Check passed — no errors found."
          else
            echo "❌ Plugin Check found errors:"
            cat /tmp/pcp-output.txt
            exit 1
          fi

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-log-pcp
          path: /tmp/test-site/wp-content/debug.log
          if-no-files-found: ignore
          retention-days: 7