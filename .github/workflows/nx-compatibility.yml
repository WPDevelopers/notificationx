name: Compatibility Test for NotificationX

on:
  workflow_dispatch:
    inputs:
      plugin_repo:
        description: 'NotificationX Plugin Repository URL'
        required: false
        default: 'WPDevelopers/notificationx'
      plugin_branch:
        description: 'Plugin Branch to Test'
        required: false
        default: 'master'
 

jobs:
  wordpress-test:
    name: WP ${{ matrix.wordpress }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-master

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        wordpress: ['6.7', '6.9.1', '6.9.2', '6.9.4','master']
        exclude:
          # Exclude incompatible combinations
          - wordpress: 'master'
            php: '7.4'

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout NotificationX plugin
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.inputs.plugin_repo || 'WPDevelopers/notificationx' }}
          ref: ${{ github.event.inputs.plugin_branch || 'master' }}
          path: notificationx

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, xml, curl, zip, intl, gd
          coverage: none
          tools: composer, wp-cli

      - name: Verify PHP and WP-CLI versions
        run: |
          php -v
          wp --version

      - name: Wait for MySQL to be ready
        run: |
          echo "⏳ Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if mysqladmin ping -h"127.0.0.1" -P"3306" -u"root" -p"root" --silent; then
              echo "✅ MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

          # Verify MySQL is accessible
          mysql -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT VERSION();"

      - name: Download WordPress ${{ matrix.wordpress }}
        run: |
          echo "📥 Downloading WordPress ${{ matrix.wordpress }}..."
          wp core download --version=${{ matrix.wordpress }} --path=/tmp/wordpress
          echo "✅ WordPress ${{ matrix.wordpress }} downloaded successfully"

      - name: Create WordPress configuration
        run: |
          echo "⚙️  Creating WordPress configuration..."
          wp config create \
            --path=/tmp/wordpress \
            --dbname=wordpress_test \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1:3306 \
            --skip-check
          echo "✅ WordPress configuration created"

      - name: Install WordPress
        run: |
          echo "🔧 Installing WordPress..."
          wp core install \
            --path=/tmp/wordpress \
            --url=http://localhost \
            --title="NotificationX CI Test" \
            --admin_user=admin \
            --admin_password=admin \
            --admin_email=test@example.com \
            --skip-email

          # Enable debug mode
          wp config set WP_DEBUG true --raw --path=/tmp/wordpress
          wp config set WP_DEBUG_LOG true --raw --path=/tmp/wordpress
          wp config set WP_DEBUG_DISPLAY false --raw --path=/tmp/wordpress

          echo "✅ WordPress installed successfully"

      - name: Copy plugin to WordPress
        run: |
          echo "📦 Copying NotificationX plugin to WordPress..."
          mkdir -p /tmp/wordpress/wp-content/plugins/notificationx
          cp -r notificationx/* /tmp/wordpress/wp-content/plugins/notificationx/
          echo "✅ Plugin copied successfully"

      - name: Check PHP syntax
        run: |
          echo "🔍 Checking PHP syntax for all plugin files..."
          SYNTAX_ERRORS=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "❌ Syntax error in: $file"
              php -l "$file"
              SYNTAX_ERRORS=1
            fi
          done < <(find /tmp/wordpress/wp-content/plugins/notificationx -name "*.php")

          if [ $SYNTAX_ERRORS -eq 1 ]; then
            echo "❌ PHP syntax errors found!"
            exit 1
          fi
          echo "✅ No PHP syntax errors found"

      - name: Activate NotificationX plugin
        run: |
          echo "🔌 Activating NotificationX plugin..."
          wp plugin activate notificationx --path=/tmp/wordpress

          if [ $? -ne 0 ]; then
            echo "❌ Plugin activation failed!"
            exit 1
          fi
          echo "✅ Plugin activated successfully"

      - name: Verify plugin is active
        run: |
          echo "🔍 Verifying plugin activation..."
          wp plugin list --path=/tmp/wordpress --status=active --format=csv | grep notificationx

          if [ $? -ne 0 ]; then
            echo "❌ Plugin is not in active plugins list!"
            exit 1
          fi
          echo "✅ Plugin is active and verified"

      - name: Check for errors in debug log
        if: always()
        run: |
          echo "📋 Checking WordPress debug log..."
          DEBUG_LOG="/tmp/wordpress/wp-content/debug.log"

          if [ -f "$DEBUG_LOG" ]; then
            echo "Debug log exists, checking for fatal errors..."

            if grep -i "fatal error\|parse error" "$DEBUG_LOG"; then
              echo "❌ Fatal errors found in debug log!"
              cat "$DEBUG_LOG"
              exit 1
            fi

            if grep -i "warning" "$DEBUG_LOG"; then
              echo "⚠️  Warnings found in debug log (non-blocking):"
              grep -i "warning" "$DEBUG_LOG" | head -10
            fi

            echo "✅ No fatal errors in debug log"
          else
            echo "✅ No debug log file (no errors occurred)"
          fi

      - name: Final status report
        if: always()
        run: |
          echo "📊 Final Status Report"
          echo "======================"
          echo "WordPress Version: $(wp core version --path=/tmp/wordpress)"
          echo "PHP Version: $(php -v | head -n 1)"
          echo "Plugin Status:"
          wp plugin list --path=/tmp/wordpress --format=table
          echo "======================"
          echo "✅ Compatibility test completed!"

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: debug-log-wp${{ matrix.wordpress }}-php${{ matrix.php }}
          path: /tmp/wordpress/wp-content/debug.log
          if-no-files-found: ignore
          retention-days: 7

