<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <radialGradient id="t6CardBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </radialGradient>
    <linearGradient id="t6Headphone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1f1f1f"/>
    </linearGradient>
    <clipPath id="t6CardClip">
      <rect x="16" y="14" width="288" height="172" rx="6"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="320" height="200" fill="#e8eaf0"/>

  <!-- Card drop shadow -->
  <rect x="20" y="20" width="284" height="166" rx="6" fill="rgba(0,0,0,0.13)"/>

  <!-- Card base with radial gradient background -->
  <rect x="16" y="14" width="288" height="172" rx="6" fill="url(#t6CardBg)"/>

  <g clip-path="url(#t6CardClip)">
    <!-- Product image: stylized headphones -->
    <g transform="translate(160,52)">
      <!-- Headband -->
      <path d="M-22,4 Q-22,-18 0,-18 Q22,-18 22,4" fill="none" stroke="url(#t6Headphone)" stroke-width="3" stroke-linecap="round"/>
      <!-- Left earcup -->
      <ellipse cx="-22" cy="8" rx="9" ry="11" fill="url(#t6Headphone)"/>
      <ellipse cx="-22" cy="8" rx="5" ry="7" fill="#d48fb6"/>
      <!-- Right earcup -->
      <ellipse cx="22" cy="8" rx="9" ry="11" fill="url(#t6Headphone)"/>
      <ellipse cx="22" cy="8" rx="5" ry="7" fill="#d48fb6"/>
    </g>

    <!-- Title -->
    <text x="160" y="92" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="700" fill="#1f2937" text-anchor="middle">Limited Edition Bass Boost</text>
    <text x="160" y="103" font-family="Inter,Arial,sans-serif" font-size="9.5" font-weight="700" fill="#1f2937" text-anchor="middle">Headphones</text>

    <!-- "Offer Ends In" -->
    <text x="160" y="118" font-family="Inter,Arial,sans-serif" font-size="5.5" fill="#4b5563" text-anchor="middle">Offer Ends In</text>

    <!-- Countdown boxes (mauve bg, dark text) with separators -->
    <g>
      <rect x="106" y="124" width="20" height="20" rx="1.5" fill="#f3e8f2"/>
      <text x="116" y="138" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#374151" text-anchor="middle">02</text>
      <text x="116" y="151" font-family="Inter,Arial,sans-serif" font-size="3.8" fill="#9f1239" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.2">DAYS</text>

      <text x="130" y="139" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#9ca3af" text-anchor="middle">:</text>

      <rect x="134" y="124" width="20" height="20" rx="1.5" fill="#f3e8f2"/>
      <text x="144" y="138" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#374151" text-anchor="middle">14</text>
      <text x="144" y="151" font-family="Inter,Arial,sans-serif" font-size="3.8" fill="#9f1239" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.2">HOURS</text>

      <text x="158" y="139" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#9ca3af" text-anchor="middle">:</text>

      <rect x="162" y="124" width="20" height="20" rx="1.5" fill="#f3e8f2"/>
      <text x="172" y="138" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#374151" text-anchor="middle">30</text>
      <text x="172" y="151" font-family="Inter,Arial,sans-serif" font-size="3.8" fill="#9f1239" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.2">MIN</text>

      <text x="186" y="139" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#9ca3af" text-anchor="middle">:</text>

      <rect x="190" y="124" width="20" height="20" rx="1.5" fill="#f3e8f2"/>
      <text x="200" y="138" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#374151" text-anchor="middle">21</text>
      <text x="200" y="151" font-family="Inter,Arial,sans-serif" font-size="3.8" fill="#9f1239" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.2">SEC</text>
    </g>

    <!-- CTA mauve button -->
    <rect x="42" y="161" width="236" height="18" rx="2" fill="#845e7c"/>
    <text x="160" y="173" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="700" fill="#ffffff" text-anchor="middle">Grab Now</text>
  </g>

  <!-- White circular close button -->
  <circle cx="294" cy="26" r="9" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="294" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">×</text>
</svg>
