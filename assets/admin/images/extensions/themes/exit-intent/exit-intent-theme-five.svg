<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <clipPath id="t5CardClip">
      <rect x="16" y="14" width="288" height="172" rx="2"/>
    </clipPath>
    <linearGradient id="t5RightBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f06292"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="320" height="200" fill="#e8eaf0"/>

  <!-- Card drop shadow -->
  <rect x="20" y="20" width="284" height="166" rx="2" fill="rgba(0,0,0,0.13)"/>

  <!-- Card base -->
  <rect x="16" y="14" width="288" height="172" rx="2" fill="#ffffff"/>

  <g clip-path="url(#t5CardClip)">
    <!-- Left content panel (white) -->
    <rect x="16" y="14" width="170" height="172" fill="#ffffff"/>

    <!-- Decorative outline circle (top, partially clipped) -->
    <ellipse cx="115" cy="14" rx="22" ry="22" fill="none" stroke="#fce7f3" stroke-width="1"/>

    <!-- "Flash Sale" -->
    <text x="100" y="42" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" fill="#333333" text-anchor="middle">Flash Sale</text>

    <!-- Big "50% OFF" headline -->
    <text x="100" y="74" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="900" fill="#e91e63" text-anchor="middle" letter-spacing="-0.6">50% OFF</text>

    <!-- ON ENTIRE ORDER -->
    <text x="100" y="89" font-family="Inter,Arial,sans-serif" font-size="6" font-weight="700" fill="#333333" text-anchor="middle" letter-spacing="1.2">ON ENTIRE ORDER</text>

    <!-- LIMITED-TIME OFFER label -->
    <text x="100" y="100" font-family="Inter,Arial,sans-serif" font-size="4.6" font-weight="700" fill="#777777" text-anchor="middle" letter-spacing="0.5">LIMITED-TIME OFFER! SALE ENDS IN</text>

    <!-- Countdown boxes (light pink bg, pink text) -->
    <g>
      <rect x="42"  y="108" width="22" height="22" rx="2" fill="#fff0f5"/>
      <text x="53"  y="123" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#e91e63" text-anchor="middle">01</text>
      <text x="53"  y="138" font-family="Inter,Arial,sans-serif" font-size="4.5" font-weight="700" fill="#777777" text-anchor="middle">DAYS</text>

      <rect x="68"  y="108" width="22" height="22" rx="2" fill="#fff0f5"/>
      <text x="79"  y="123" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#e91e63" text-anchor="middle">14</text>
      <text x="79"  y="138" font-family="Inter,Arial,sans-serif" font-size="4.5" font-weight="700" fill="#777777" text-anchor="middle">HRS</text>

      <rect x="94"  y="108" width="22" height="22" rx="2" fill="#fff0f5"/>
      <text x="105" y="123" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#e91e63" text-anchor="middle">30</text>
      <text x="105" y="138" font-family="Inter,Arial,sans-serif" font-size="4.5" font-weight="700" fill="#777777" text-anchor="middle">MIN</text>

      <rect x="120" y="108" width="22" height="22" rx="2" fill="#fff0f5"/>
      <text x="131" y="123" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#e91e63" text-anchor="middle">26</text>
      <text x="131" y="138" font-family="Inter,Arial,sans-serif" font-size="4.5" font-weight="700" fill="#777777" text-anchor="middle">SEC</text>
    </g>

    <!-- CTA pink button -->
    <rect x="42" y="150" width="116" height="20" rx="2" fill="#e91e63"/>
    <text x="100" y="163" font-family="Inter,Arial,sans-serif" font-size="7" font-weight="700" fill="#ffffff" text-anchor="middle">Shop The Flash Sale Now</text>

    <!-- NO, THANKS! -->
    <text x="100" y="180" font-family="Inter,Arial,sans-serif" font-size="5.5" font-weight="700" fill="#777777" text-anchor="middle" letter-spacing="0.8">NO, THANKS!</text>

    <!-- Right image panel (pink) -->
    <rect x="186" y="14" width="118" height="172" fill="url(#t5RightBg)"/>

    <!-- Lifestyle silhouette suggestion -->
    <ellipse cx="240" cy="62" rx="14" ry="16" fill="#f8bbd0" opacity="0.85"/>
    <path d="M218,80 Q218,70 240,70 Q262,70 262,80 L268,150 Q268,170 240,170 Q212,170 212,150 Z" fill="#ad1457" opacity="0.55"/>
    <rect x="222" y="140" width="16" height="22" rx="2" fill="#8e0e3a" opacity="0.7"/>
    <rect x="244" y="140" width="16" height="22" rx="2" fill="#8e0e3a" opacity="0.7"/>
  </g>

  <!-- Pink circular close button -->
  <circle cx="294" cy="26" r="9" fill="#e91e63"/>
  <text x="294" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">×</text>
</svg>
