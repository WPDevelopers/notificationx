<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <clipPath id="t3Card">
      <rect x="35" y="55" width="250" height="138" rx="16"/>
    </clipPath>
    <filter id="t3Shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.14)"/>
    </filter>
  </defs>

  <!-- Page background (neutral, not yellow) -->
  <rect width="320" height="200" fill="#f0f0f0"/>

  <!-- Card shadow -->
  <rect x="39" y="62" width="246" height="134" rx="16" fill="rgba(0,0,0,0.1)"/>

  <!-- Card — white -->
  <rect x="35" y="55" width="250" height="138" rx="16" fill="#ffffff"/>

  <!-- ── CHARACTER (bleeds above card) ── -->

  <!-- Sweater body — yellow trapezoid -->
  <path d="M136,52 L130,80 L190,80 L184,52 Q172,49 160,50 Q148,49 136,52 Z" fill="#FFC107"/>

  <!-- Diamond pattern on sweater -->
  <path d="M147,55 L153,62 L147,69 L141,62 Z" fill="#E65100" opacity="0.45"/>
  <path d="M159,55 L165,62 L159,69 L153,62 Z" fill="#E65100" opacity="0.45"/>
  <path d="M171,55 L177,62 L171,69 L165,62 Z" fill="#E65100" opacity="0.45"/>
  <path d="M153,62 L159,69 L153,76 L147,69 Z" fill="#E65100" opacity="0.45"/>
  <path d="M165,62 L171,69 L165,76 L159,69 Z" fill="#E65100" opacity="0.45"/>

  <!-- White collar -->
  <path d="M153,50 Q160,56 167,50 L169,53 Q160,59 151,53 Z" fill="#ffffff"/>

  <!-- Left arm (up toward face) -->
  <path d="M136,54 C120,51 116,38 126,34" stroke="#7a4424" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Right arm (up toward face) -->
  <path d="M184,54 C200,51 204,38 194,34" stroke="#7a4424" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Left hand at cheek -->
  <ellipse cx="128" cy="32" rx="11" ry="9" fill="#7a4424"/>

  <!-- Right hand at cheek -->
  <ellipse cx="192" cy="32" rx="11" ry="9" fill="#7a4424"/>

  <!-- Hair (dark, behind head) -->
  <ellipse cx="160" cy="19" rx="18" ry="13" fill="#1a0804"/>
  <!-- Hair side volume -->
  <ellipse cx="143" cy="27" rx="7"  ry="11" fill="#1a0804"/>
  <ellipse cx="177" cy="27" rx="7"  ry="11" fill="#1a0804"/>

  <!-- Face / head -->
  <circle cx="160" cy="31" r="17" fill="#7a4424"/>

  <!-- Hair on top (front layer) -->
  <ellipse cx="160" cy="16" rx="16" ry="9" fill="#1a0804"/>

  <!-- Ears -->
  <circle cx="143" cy="31" r="4" fill="#6b3b1e"/>
  <circle cx="177" cy="31" r="4" fill="#6b3b1e"/>

  <!-- Eyes (white + dark pupils) -->
  <ellipse cx="154" cy="29" rx="3.5" ry="3.5" fill="#fff"/>
  <ellipse cx="166" cy="29" rx="3.5" ry="3.5" fill="#fff"/>
  <circle  cx="154" cy="30" r="2"   fill="#1a0804"/>
  <circle  cx="166" cy="30" r="2"   fill="#1a0804"/>

  <!-- Mouth — open (surprised) -->
  <ellipse cx="160" cy="38" rx="5" ry="4" fill="#3d1208"/>

  <!-- Neck -->
  <rect x="156" y="45" width="8" height="8" rx="2" fill="#7a4424"/>

  <!-- ── SPEECH BUBBLE "STOP!" ── -->
  <rect x="183" y="4" width="58" height="30" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Bubble tail pointing to character's right -->
  <path d="M188,34 L178,44 L204,34 Z" fill="#ffffff"/>
  <path d="M188,34 L178,44" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>
  <text x="212" y="24" font-family="Arial,sans-serif" font-size="12" font-weight="900" fill="#1a1a2e" text-anchor="middle">STOP!</text>

  <!-- ── CARD CONTENT ── -->

  <!-- Close button (lavender bg, purple ×) -->
  <circle cx="272" cy="67" r="9" fill="#ede9fe"/>
  <text x="272" y="71.5" font-family="Arial,sans-serif" font-size="12" fill="#7c3aed" text-anchor="middle" font-weight="700">×</text>

  <!-- "Wait, don't go!" headline -->
  <text x="160" y="96" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#1a1a2e" text-anchor="middle">Wait, don't go!</text>

  <!-- Subtitle -->
  <text x="160" y="111" font-family="Arial,sans-serif" font-size="6" fill="#666666" text-anchor="middle">Before you leave, we have a special offer just for you!</text>

  <!-- Offer text (pink bold) -->
  <text x="160" y="124" font-family="Arial,sans-serif" font-size="7.5" font-weight="700" fill="#e91e8c" text-anchor="middle">Get 15% off your next purchase!</text>

  <!-- Coupon info -->
  <text x="160" y="137" font-family="Arial,sans-serif" font-size="5.5" fill="#888888" text-anchor="middle">Use code STAY15 at checkout. Don't miss out on this limited-time offer.</text>

  <!-- "Claim Offer" button (purple) -->
  <rect x="116" y="148" width="88" height="24" rx="8" fill="#6d28d9"/>
  <text x="160" y="163" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#ffffff" text-anchor="middle">Claim Offer</text>

  <!-- Dismiss link -->
  <text x="160" y="183" font-family="Arial,sans-serif" font-size="5.5" fill="#aaaaaa" text-anchor="middle">No, thanks!</text>
</svg>
