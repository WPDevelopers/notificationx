<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="t4bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ebe8fb"/>
      <stop offset="100%" stop-color="#d4d0f0"/>
    </linearGradient>
    <clipPath id="t4clip">
      <rect width="320" height="200" rx="14"/>
    </clipPath>
    <filter id="t4pshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="url(#t4bg)" rx="14"/>

  <!-- Decorative rings clipped to card -->
  <g clip-path="url(#t4clip)">
    <circle cx="0"   cy="0"   r="140" fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="32"/>
    <circle cx="0"   cy="0"   r="95"  fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="22"/>
    <circle cx="320" cy="200" r="130" fill="none" stroke="rgba(255,255,255,0.36)" stroke-width="30"/>
    <circle cx="320" cy="200" r="88"  fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="18"/>
  </g>

  <!-- Close button — top-right corner -->
  <circle cx="311" cy="13" r="11" fill="rgba(255,255,255,0.92)" stroke="#dddddd" stroke-width="1"/>
  <text x="311" y="18" font-family="Arial,sans-serif" font-size="13" fill="#666666" text-anchor="middle">×</text>

  <!-- Badge pill -->
  <rect x="104" y="14" width="112" height="18" rx="9" fill="#1a1a2e"/>
  <text x="160" y="26.5" font-family="Arial,sans-serif" font-size="7.5" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="0.3">Before you go...</text>

  <!-- Heading -->
  <text x="160" y="56" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#1a1a2e" text-anchor="middle">Watch this short demo video</text>

  <!-- Subtitle line 1 -->
  <text x="160" y="70" font-family="Arial,sans-serif" font-size="5.5" fill="#666666" text-anchor="middle">See how our product simplifies discovery, security,</text>
  <!-- Subtitle line 2 -->
  <text x="160" y="78" font-family="Arial,sans-serif" font-size="5.5" fill="#666666" text-anchor="middle">and deployment of your workflow.</text>

  <!-- Video card background -->
  <rect x="26" y="88" width="268" height="102" rx="10" fill="#c8c3ea"/>

  <!-- Browser chrome bar -->
  <rect x="26" y="88" width="268" height="18" rx="10" fill="#f0eeff"/>
  <rect x="26"  y="98" width="268" height="8" fill="#f0eeff"/>
  <circle cx="40"  cy="97" r="3.5" fill="#ff6b6b"/>
  <circle cx="52"  cy="97" r="3.5" fill="#ffd93d"/>
  <circle cx="64"  cy="97" r="3.5" fill="#6bcb77"/>

  <!-- Dashboard content rows -->
  <rect x="34" y="112" width="252" height="10" rx="3" fill="rgba(70,50,180,0.13)"/>
  <rect x="34" y="126" width="252" height="10" rx="3" fill="rgba(70,50,180,0.10)"/>
  <rect x="34" y="140" width="180" height="10" rx="3" fill="rgba(70,50,180,0.08)"/>
  <rect x="34" y="112" width="80"  height="10" rx="3" fill="rgba(70,50,180,0.22)"/>
  <rect x="34" y="126" width="60"  height="10" rx="3" fill="rgba(70,50,180,0.18)"/>
  <rect x="220" y="112" width="66" height="10" rx="3" fill="rgba(70,50,180,0.14)"/>

  <!-- Play button -->
  <circle cx="160" cy="137" r="22" fill="rgba(255,255,255,0.92)" filter="url(#t4pshadow)"/>
  <polygon points="154,128 154,146 172,137" fill="#1a1a2e"/>
</svg>
