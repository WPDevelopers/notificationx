<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <clipPath id="t7CardClip">
      <rect x="16" y="14" width="288" height="172" rx="6"/>
    </clipPath>
    <linearGradient id="t7Wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a655c"/>
      <stop offset="100%" stop-color="#5b4a44"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="320" height="200" fill="#e5e7eb"/>

  <!-- Card drop shadow -->
  <rect x="20" y="20" width="284" height="166" rx="6" fill="rgba(0,0,0,0.18)"/>

  <!-- Card base -->
  <rect x="16" y="14" width="288" height="172" rx="6" fill="#413532"/>

  <g clip-path="url(#t7CardClip)">
    <!-- Left image panel — interior scene illustration -->
    <rect x="16" y="14" width="144" height="172" fill="url(#t7Wall)"/>
    <!-- Floor -->
    <rect x="16" y="148" width="144" height="38" fill="#3f322d"/>
    <!-- Plant pot -->
    <ellipse cx="60" cy="160" rx="34" ry="6" fill="rgba(0,0,0,0.35)"/>
    <rect x="50" y="118" width="22" height="32" rx="2" fill="#f1efe7"/>
    <!-- Plant leaves -->
    <path d="M61,118 Q40,90 38,60 Q52,84 60,116 Z" fill="#3a6b4e"/>
    <path d="M61,118 Q82,92 86,64 Q72,86 62,116 Z" fill="#4f8a64"/>
    <path d="M61,118 Q58,80 50,52 Q56,80 60,116 Z" fill="#2f5a40"/>
    <!-- Yellow armchair -->
    <rect x="92" y="128" width="34" height="22" rx="3" fill="#f4c64f"/>
    <rect x="92" y="116" width="34" height="20" rx="3" fill="#e9b942"/>
    <rect x="93" y="148" width="6" height="8" fill="#3a2f2c"/>
    <rect x="119" y="148" width="6" height="8" fill="#3a2f2c"/>
    <!-- Side table + lamp -->
    <rect x="80" y="138" width="14" height="3" fill="#2c2421"/>
    <line x1="83" y1="141" x2="80" y2="156" stroke="#2c2421" stroke-width="1.5"/>
    <line x1="91" y1="141" x2="94" y2="156" stroke="#2c2421" stroke-width="1.5"/>
    <rect x="83" y="120" width="8" height="2" fill="#bfb6a8"/>
    <line x1="87" y1="122" x2="87" y2="138" stroke="#7e7568" stroke-width="1"/>
    <path d="M82,118 L92,118 L90,114 L84,114 Z" fill="#f1efe7"/>

    <!-- Right content panel -->
    <rect x="160" y="14" width="144" height="172" fill="#413532"/>

    <!-- Headline (serif, gold) -->
    <text x="172" y="48" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="700" fill="#f3d5a2">Home Is Where Your</text>
    <text x="172" y="62" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="700" fill="#f3d5a2">Story Begins</text>

    <!-- Discount banner -->
    <rect x="172" y="74" width="120" height="14" rx="1.5" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
    <text x="178" y="84" font-family="Inter,Arial,sans-serif" font-size="6" font-weight="700" fill="#f3d5a2">Get 15% Off Your First Order!</text>

    <!-- Description -->
    <text x="172" y="104" font-family="Inter,Arial,sans-serif" font-size="5.5" fill="#f3d5a2" fill-opacity="0.9">Discover timeless pieces that turn any</text>
    <text x="172" y="113" font-family="Inter,Arial,sans-serif" font-size="5.5" fill="#f3d5a2" fill-opacity="0.9">space into a sanctuary.</text>

    <!-- Email input (white) -->
    <rect x="172" y="124" width="120" height="16" fill="#ffffff" stroke="#6b7280" stroke-width="0.5"/>
    <text x="178" y="135" font-family="Inter,Arial,sans-serif" font-size="5.5" fill="#9ca3af">Enter your email</text>

    <!-- Submit button (cream) -->
    <rect x="172" y="146" width="120" height="18" fill="#f3d5a2"/>
    <text x="232" y="158" font-family="Inter,Arial,sans-serif" font-size="6.5" font-weight="700" fill="#4d3e3e" text-anchor="middle" letter-spacing="0.7">SEND COUPON</text>
  </g>

  <!-- Close button (top-right, cream) -->
  <text x="296" y="30" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f3d5a2" text-anchor="middle">×</text>
</svg>
